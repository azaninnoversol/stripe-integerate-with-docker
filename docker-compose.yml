services:
  web-dev:
    profiles: ["dev"]
    build:
      context: .
      target: dev
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 5000
    volumes:
      - ./:/app
      - node_modules_cache:/app/node_modules
    command: npm run dev

  web-prod:
    profiles: ["prod"]
    build:
      context: .
      target: runner
    ports:
      - "5000:4000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
    restart: unless-stopped

volumes:
  node_modules_cache:
